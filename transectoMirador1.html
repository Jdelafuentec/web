<!DOCTYPE html>
<html lang="en">
 <head>
  <meta charset="utf-8"/>
  <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
  <title>
   Transecto Mirador
  </title>
  <link href="./css/style.css" rel="stylesheet"/>
 </head>
 <body>
  <img alt="Transecto" class="fondo-transecto" src="./img/lagunaMirador_Panorama-1paralaxsi.jpg"/>
  <!-- Aquí se asigna la clase bg-1, pero puedes cambiarla a bg-2 o bg-3 según el caso -->
  <div class="infoScroll">
   <p>
    Scroll hasta el final de la pagina
    <p>
    </p>
   </p>
  </div>
  <div class="white-row">
   <div class="button-container">
    <button class="button" id="descriptionButton">
     DESCRIPCI&Oacute;N
    </button>
    <button class="button" id="locationButton">
     UBICACI&Oacute;N
    </button>
    <button class="button" id="compositionButton">
     COMPOSICI&Oacute;N
    </button>
    <button class="button" id="imagesButton">
     IM&Aacute;GENES
    </button>
   </div>
  </div>
  <div class="modal" id="descriptionModal">
   <div class="modal-content">
    <button class="close-btn closeDescriptionModal" id="closeDescriptionModal">
     X
    </button>
    <div class="modal-column" style="padding: 20px;">
     <h2>
      Descripci&oacute;n
     </h2>
     <p>
      Contenido de descripci&oacute;n por definir...
     </p>
    </div>
   </div>
  </div>
  <div class="modal" id="locationModal">
   <div class="modal-content">
    <button class="close-btn closeDescriptionModal" id="closeLocationModal">
     X
    </button>
    <div class="modal-column" style="padding: 20px;">
     <h2>
      Ubicaci&oacute;n
     </h2>
     <p>
      Contenido de ubicaci&oacute;n por definir...
     </p>
    </div>
   </div>
  </div>
  <div class="modal" id="compositionModal">
   <div class="modal-content">
    <button class="close-btn closeDescriptionModal" id="closeCompositionModal">
     X
    </button>
    <div class="modal-column" style="padding: 20px;">
     <h2>
      Composici&oacute;n
     </h2>
     <p>
      Contenido de composici&oacute;n por definir...
     </p>
    </div>
   </div>
  </div>
  <div class="modal" id="imagesModal">
   <div class="modal-content">
    <button class="close-btn closeDescriptionModal" id="closeImagesModal">
     X
    </button>
    <div class="modal-column" style="padding: 20px;">
     <h2>
      Im&aacute;genes
     </h2>
     <p>
      Contenido de im&aacute;genes por definir...
     </p>
    </div>
   </div>
  </div>
  <script class="injected-modal-script">
   document.addEventListener("DOMContentLoaded", function () {
  function setupModalInjected(buttonId, modalId, closeId) {
    const button = document.getElementById(buttonId);
    const modal = document.getElementById(modalId);
    const close = document.getElementById(closeId);

    if (button && modal && close) {
      button.addEventListener("click", function () {
        modal.style.display = "flex";
      });
      close.addEventListener("click", function () {
        modal.style.display = "none";
      });
      window.addEventListener("click", function (event) {
        if (event.target === modal) {
          modal.style.display = "none";
        }
      });
    }
  }

  setupModalInjected("descriptionButton", "descriptionModal", "closeDescriptionModal");
  setupModalInjected("locationButton", "locationModal", "closeLocationModal");
  setupModalInjected("compositionButton", "compositionModal", "closeCompositionModal");
  setupModalInjected("imagesButton", "imagesModal", "closeImagesModal");

  document.querySelectorAll(".modal").forEach((m) => {
    if (m.style.display !== "none" && m.style.display !== "flex") {
        m.style.display = "none";
    }
  });
});
  </script>
 </body>
</html>
