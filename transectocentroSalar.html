<!DOCTYPE html>
<html lang="en">
 <head>
  <meta charset="utf-8"/>
  <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
  <title>
   Laguna Centro del Salar
  </title>
  <link href="./css/style.css" rel="stylesheet"/>
 </head>
 <body>
  <img alt="Transecto" class="fondo-transecto" src="./img/salarLagunaCentro_maricunga.jpg"/>
  <!-- Aquí se asigna la clase bg-1, pero puedes cambiarla a bg-2 o bg-3 según el caso -->
  <div class="infoScroll">
   <p>
    Scroll hasta el final de la pagina
    <p>
    </p>
   </p>
  </div>
  <div class="white-row">
   <div class="button-container">
    <button class="button" id="descriptionButton">
     DESCRIPCI&Oacute;N
    </button>
    <button class="button" id="locationButton">
     UBICACI&Oacute;N
    </button>
    <button class="button" id="compositionButton">
     COMPOSICI&Oacute;N
    </button>
    <button class="button" id="imagesButton">
     IM&Aacute;GENES
    </button>
   </div>
  </div>
  <div class="modal" id="descriptionModal">
   <div class="modal-content">
    <button class="close-btn closeDescriptionModal" id="closeDescriptionModal">
     X
    </button>
    <div class="modal-column" style="padding: 20px;">
     <h2>
      Descripci&oacute;n
     </h2>
     <p>
      Contenido de descripci&oacute;n por definir...
     </p>
    </div>
   </div>
  </div>
  <div class="modal" id="locationModal">
   <div class="modal-content">
    <button class="close-btn closeDescriptionModal" id="closeLocationModal">
     X
    </button>
    <div class="modal-column" style="padding: 20px;">
     <h2>
      Ubicaci&oacute;n
     </h2>
     <p>
      Contenido de ubicaci&oacute;n por definir...
     </p>
    </div>
   </div>
  </div>
  <div class="modal" id="compositionModal">
   <div class="modal-content">
    <button class="close-btn closeDescriptionModal" id="closeCompositionModal">
     X
    </button>
    <div class="modal-column" style="padding: 20px;">
     <h2>
      Composici&oacute;n
     </h2>
     <p>
      Contenido de composici&oacute;n por definir...
     </p>
    </div>
   </div>
  </div>
  <div class="modal" id="imagesModal">
   <div class="modal-content">
    <button class="close-btn closeDescriptionModal" id="closeImagesModal">
     X
    </button>
     <div class="modal-column" style="padding: 20px; width: 100%; box-sizing: border-box;">
      <h2 style="margin-bottom: 20px;">
       Im&aacute;genes del Centro del Salar
      </h2>
      <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 15px;">
       <img src="./centroSalar/20251127_103249.jpg" alt="Centro Salar 1" style="width: 100%; height: 250px; object-fit: cover; border-radius: 8px; transition: transform 0.3s ease;" onmouseover="this.style.transform='scale(1.03)'" onmouseout="this.style.transform='scale(1)'">
       <img src="./centroSalar/20251127_122029.jpg" alt="Centro Salar 2" style="width: 100%; height: 250px; object-fit: cover; border-radius: 8px; transition: transform 0.3s ease;" onmouseover="this.style.transform='scale(1.03)'" onmouseout="this.style.transform='scale(1)'">
       <img src="./centroSalar/20251127_123340.jpg" alt="Centro Salar 3" style="width: 100%; height: 250px; object-fit: cover; border-radius: 8px; transition: transform 0.3s ease;" onmouseover="this.style.transform='scale(1.03)'" onmouseout="this.style.transform='scale(1)'">
       <img src="./centroSalar/20251127_130949.jpg" alt="Centro Salar 4" style="width: 100%; height: 250px; object-fit: cover; border-radius: 8px; transition: transform 0.3s ease;" onmouseover="this.style.transform='scale(1.03)'" onmouseout="this.style.transform='scale(1)'">
      </div>
     </div>
   </div>
  </div>
  <script class="injected-modal-script">
   document.addEventListener("DOMContentLoaded", function () {
  function setupModalInjected(buttonId, modalId, closeId) {
    const button = document.getElementById(buttonId);
    const modal = document.getElementById(modalId);
    const close = document.getElementById(closeId);

    if (button && modal && close) {
      button.addEventListener("click", function () {
        modal.style.display = "flex";
      });
      close.addEventListener("click", function () {
        modal.style.display = "none";
      });
      window.addEventListener("click", function (event) {
        if (event.target === modal) {
          modal.style.display = "none";
        }
      });
    }
  }

  setupModalInjected("descriptionButton", "descriptionModal", "closeDescriptionModal");
  setupModalInjected("locationButton", "locationModal", "closeLocationModal");
  setupModalInjected("compositionButton", "compositionModal", "closeCompositionModal");
  setupModalInjected("imagesButton", "imagesModal", "closeImagesModal");

  document.querySelectorAll(".modal").forEach((m) => {
    if (m.style.display !== "none" && m.style.display !== "flex") {
        m.style.display = "none";
    }
  });
});
  </script>
 </body>
</html>
